<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <rect width="200" height="200" rx="32" fill="#0a0a0a"/>

  <!-- Phone body -->
  <rect x="62" y="28" width="76" height="130" rx="12" fill="none" stroke="#e63946" stroke-width="5"/>

  <!-- Phone screen area -->
  <rect x="70" y="44" width="60" height="90" rx="4" fill="#e63946" fill-opacity="0.08" stroke="#e63946" stroke-width="2" stroke-opacity="0.4"/>

  <!-- Home button / notch -->
  <rect x="88" y="148" width="24" height="4" rx="2" fill="#e63946" fill-opacity="0.5"/>

  <!-- SKULL on screen -->
  <!-- Skull cranium -->
  <ellipse cx="100" cy="81" rx="18" ry="16" fill="#e63946"/>

  <!-- Eye sockets -->
  <ellipse cx="93" cy="80" rx="5" ry="5.5" fill="#0a0a0a"/>
  <ellipse cx="107" cy="80" rx="5" ry="5.5" fill="#0a0a0a"/>

  <!-- Nose cavity -->
  <path d="M98 88 L102 88 L100 92 Z" fill="#0a0a0a"/>

  <!-- Jaw / teeth -->
  <rect x="83" y="93" width="34" height="9" rx="3" fill="#e63946"/>
  <line x1="91" y1="93" x2="91" y2="102" stroke="#0a0a0a" stroke-width="2.5"/>
  <line x1="100" y1="93" x2="100" y2="102" stroke="#0a0a0a" stroke-width="2.5"/>
  <line x1="109" y1="93" x2="109" y2="102" stroke="#0a0a0a" stroke-width="2.5"/>

  <!-- Crossbones under skull -->
  <line x1="79" y1="107" x2="121" y2="120" stroke="#e63946" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="121" y1="107" x2="79" y2="120" stroke="#e63946" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- Knobs on crossbones -->
  <circle cx="79" cy="107" r="3.5" fill="#e63946" fill-opacity="0.6"/>
  <circle cx="121" cy="107" r="3.5" fill="#e63946" fill-opacity="0.6"/>
  <circle cx="79" cy="120" r="3.5" fill="#e63946" fill-opacity="0.6"/>
  <circle cx="121" cy="120" r="3.5" fill="#e63946" fill-opacity="0.6"/>

  <!-- Red dot top-right corner (notification dot) -->
  <circle cx="145" cy="42" r="8" fill="#e63946"/>
  <text x="145" y="46" text-anchor="middle" font-family="Arial" font-size="10" font-weight="900" fill="white">!</text>
</svg>
